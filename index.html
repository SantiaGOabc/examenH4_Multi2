<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Star Wars: Persecución en el Espacio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        touch-action: none; /* Evita que la pantalla haga scroll al jugar en móvil */
      }
      canvas {
        box-shadow: 0 0 30px rgba(255, 232, 31, 0.2);
        display: block;
      }
    </style>
  </head>
  <body>    
    <script>
      class BootScene extends Phaser.Scene {
        constructor() {
          super("BootScene");
        }

        preload() {
          let loadingText = this.add.text(400, 300, "Cargando Hiperimpulsor...", {
            fontSize: "24px",
            fill: "#FFE81F",
            fontFamily: "'Roboto Mono', monospace",
          }).setOrigin(0.5);

          // Imágenes
          this.load.image("menuBg", "assets/menuimg.png");
          this.load.image("xwing", "assets/xwing.png");
          this.load.image("tie", "assets/tie.png");
          this.load.image("asteroide", "assets/asteroide.png");
          this.load.image("estrellaMuerte", "assets/estrelladelamuerte.png");
          this.load.image("final", "assets/final.jpg");
          this.load.image("explosion", "assets/explosion.png");

          // Audios
          this.load.audio("laser", "assets/laser.mp3");
          this.load.audio("musicawin", "assets/musicawin.mp3");
          this.load.audio("musicaMenu", "assets/musicamenu.mp3");
          this.load.audio("sonidoStart", "assets/start.mp3");

          // Texturas generadas
          this.textures.addCanvas("espacio", crearGraficoEspacio());
          this.textures.addCanvas("laser", crearGraficoLaser());
          this.textures.addCanvas("laserTie", crearGraficoLaserTie());
        }

        create() {
          this.scene.start("MenuScene");
        }
      }

      class MenuScene extends Phaser.Scene {
        constructor() {
          super("MenuScene");
        }

        create() {
          // Fondo animado para el menú
          this.fondoEspacio = this.add.tileSprite(400, 300, 800, 600, "espacio");

          let bg = this.add.image(400, 300, "menuBg");
          bg.setDisplaySize(800, 600);
          bg.setAlpha(0.6); // Un poco transparente para ver las estrellas de fondo

          let overlay = this.add.graphics();
          overlay.fillStyle(0x000000, 0.4);
          overlay.fillRect(0, 0, 800, 600);

          let titulo = this.add.text(400, 180, "STAR WARS", {
            fontSize: "80px",
            fill: "#FFE81F",
            fontFamily: "'Orbitron', sans-serif",
            shadow: { color: "#000000", fill: true, offsetX: 5, offsetY: 5, blur: 10 }
          }).setOrigin(0.5);

          this.add.text(400, 260, "PERSECUCIÓN EN EL ESPACIO", {
            fontSize: "22px",
            fill: "#ffffff",
            fontFamily: "'Roboto Mono', monospace",
            letterSpacing: 4,
            shadow: { color: "#000000", fill: true, offsetX: 2, offsetY: 2, blur: 4 }
          }).setOrigin(0.5);

          let btnIniciar = this.add.text(400, 380, "INICIAR JUEGO", {
            fontSize: "32px",
            fill: "#FFE81F",
            fontFamily: "'Orbitron', sans-serif",
            shadow: { color: "#000000", fill: true, offsetX: 3, offsetY: 3, blur: 5 }
          }).setOrigin(0.5).setInteractive({ useHandCursor: true });

          btnIniciar.on("pointerdown", () => this.iniciarJuego());

          this.add.text(400, 480, "PC: WASD + ESPACIO | MÓVIL: Toca y arrastra", {
            fontSize: "14px",
            fill: "#aaaaaa",
            align: "center",
            fontFamily: "'Roboto Mono', monospace"
          }).setOrigin(0.5);

          this.input.keyboard.on("keydown-ENTER", () => this.iniciarJuego());
          this.input.keyboard.on("keydown-SPACE", () => this.iniciarJuego());
          this.input.on("pointerdown", () => this.iniciarJuego()); // Iniciar al tocar en móvil

          if (!this.sound.get("musicaMenu")) {
            this.musicaMenu = this.sound.add("musicaMenu", { loop: true, volume: 0.5 });
            this.musicaMenu.play();
          } else if (!this.sound.get("musicaMenu").isPlaying) {
             this.sound.get("musicaMenu").play();
          }
        }

        update() {
          // Animación hiperespacio suave
          this.fondoEspacio.tilePositionY -= 2;

          let pulse = 1 + Math.sin(this.time.now / 300) * 0.05;
          let btn = this.children.list.find(c => c.text === "INICIAR JUEGO");
          if (btn) btn.setScale(pulse);
        }

        iniciarJuego() {
          this.sound.play("sonidoStart");
          let musica = this.sound.get("musicaMenu");
          if(musica) musica.stop();
          this.scene.start("GameScene");
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("GameScene");
        }

        init() {
          this.juegoTerminado = false;
          this.puntuacion = 0;
          this.velocidadFondo = 5; // Más rápido para efecto de velocidad
          this.faseJefe = false;
          this.ultimoDisparo = 0; // Control de disparo automático para móvil
        }

        create() {
          this.fondo = this.add.tileSprite(400, 300, 800, 600, "espacio");

          this.j1 = this.physics.add.sprite(400, 450, "xwing");
          this.j1.setCollideWorldBounds(true);
          this.j1.setDisplaySize(60, 53);
          this.j1.body.setSize(350, 350, true);
          this.j1.name = "P1";
          
          this.vidaJ1 = 100;

          // TIE Fighter vuelve a estar activo desde el inicio (código original)
          this.tieFighter = this.physics.add.sprite(400, 550, "tie");
          this.tieFighter.setCollideWorldBounds(true);
          this.tieFighter.setDisplaySize(65, 43);
          this.tieFighter.body.setSize(400, 300, true);

          this.asteroides = this.physics.add.group();
          this.lasers = this.physics.add.group();
          this.lasersTie = this.physics.add.group();

          this.generadorAsteroides = this.time.addEvent({
            delay: 1000,
            callback: this.generarAsteroide,
            callbackScope: this,
            loop: true,
          });

          // Emisor de partículas para explosiones
          this.particulasE = this.add.particles(0, 0, 'laser', {
            speed: 200,
            scale: { start: 1.5, end: 0 },
            blendMode: 'ADD',
            lifespan: 300,
            emitting: false
          });

          this.teclasJ1 = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.W,
            down: Phaser.Input.Keyboard.KeyCodes.S,
            left: Phaser.Input.Keyboard.KeyCodes.A,
            right: Phaser.Input.Keyboard.KeyCodes.D,
            fire: Phaser.Input.Keyboard.KeyCodes.SPACE
          });

          this.cursores = this.input.keyboard.createCursorKeys();

          this.textoPuntuacion = this.add.text(16, 16, "SCORE: 0", {
            fontSize: "24px", fill: "#FFE81F", fontFamily: "'Orbitron', sans-serif",
            shadow: { color: "#000000", fill: true, offsetX: 2, offsetY: 2, blur: 2 }
          });

          this.barraVidaBg = this.add.graphics();
          this.barraVida = this.add.graphics();
          this.dibujarBarraVida();

          this.textoGameOver = this.add.text(400, 300, "SISTEMAS DESTRUIDOS\nToca o presiona ESPACIO para reiniciar", {
            fontSize: "24px", fill: "#ff0000", align: "center", fontFamily: "'Roboto Mono', monospace",
            shadow: { color: "#000000", fill: true, offsetX: 2, offsetY: 2, blur: 4 }
          }).setOrigin(0.5).setVisible(false);

          this.physics.add.collider(this.j1, this.asteroides, this.chocarFrenazo, null, this);
          this.physics.add.overlap(this.tieFighter, this.j1, this.atraparJugador, null, this);
          this.physics.add.overlap(this.lasersTie, this.j1, this.impactoTieAJ1, null, this);

          this.input.keyboard.on("keydown-ESC", () => {
            this.sound.stopAll();
            this.scene.start("MenuScene");
          });
        }

        dibujarBarraVida() {
          this.barraVidaBg.clear();
          this.barraVidaBg.fillStyle(0x330000, 0.8);
          this.barraVidaBg.fillRect(16, 45, 200, 10);

          this.barraVida.clear();
          let color = this.vidaJ1 > 30 ? 0x00ff00 : 0xff0000;
          this.barraVida.fillStyle(color, 0.8);
          let anchoVida = (Math.max(this.vidaJ1, 0) / 100) * 200;
          this.barraVida.fillRect(16, 45, anchoVida, 10);
        }

        update() {
          if (this.juegoTerminado) {
            if (this.cursores.space.isDown || this.input.activePointer.isDown) this.reiniciarJuego();
            return;
          }

          this.fondo.tilePositionY -= this.velocidadFondo;
          this.puntuacion += 10;
          this.textoPuntuacion.setText("SCORE: " + this.puntuacion);

          if (this.puntuacion >= 15000 && !this.faseJefe) {
            this.iniciarFaseJefe();
          }

          // Movimiento: Priorizar Touch/Móvil si está presionando
          let manejadoPorToque = false;
          if (this.input.activePointer.isDown) {
            manejadoPorToque = true;
            let tx = this.input.activePointer.x;
            let ty = this.input.activePointer.y;
            
            this.physics.moveTo(this.j1, tx, ty - 40, 400); // Offset Y para no tapar la nave con el dedo

            if (Phaser.Math.Distance.Between(this.j1.x, this.j1.y, tx, ty - 40) < 20) {
              this.j1.setVelocity(0);
            }

            // Disparo automático al tocar (limitado por tiempo)
            if (this.time.now > this.ultimoDisparo) {
              this.dispararLaser();
              this.ultimoDisparo = this.time.now + 250;
            }
          }

          // Movimiento: Teclado (si no hay toque)
          if (!manejadoPorToque && this.j1.active) {
            this.j1.setVelocity(0);
            if (this.teclasJ1.left.isDown) {
              this.j1.setVelocityX(-400);
            } else if (this.teclasJ1.right.isDown) {
              this.j1.setVelocityX(400);
            }

            if (this.teclasJ1.up.isDown) {
              this.j1.setVelocityY(-300);
            } else if (this.teclasJ1.down.isDown) {
              this.j1.setVelocityY(300);
            }

            if (Phaser.Input.Keyboard.JustDown(this.teclasJ1.fire)) {
              this.dispararLaser();
            }
          }

          // Movimiento original del TIE Fighter (IA)
          if (this.tieFighter.active) {
            if (this.tieFighter.x < this.j1.x - 10) {
              this.tieFighter.setVelocityX(160);
            } else if (this.tieFighter.x > this.j1.x + 10) {
              this.tieFighter.setVelocityX(-160);
            } else {
              this.tieFighter.setVelocityX(0);
            }

            let distanciaY = this.j1.y - this.tieFighter.y;
            if (distanciaY > 80) {
              this.tieFighter.setVelocityY(-40);
            } else {
              this.tieFighter.setVelocityY(this.j1.body.velocity.y);
            }
          }

          this.lasers.children.iterate((laser) => {
            if (laser && laser.y < -50) laser.destroy();
          });
          this.lasersTie.children.iterate((laser) => {
            if (laser && laser.y < -50) laser.destroy();
          });
          this.asteroides.children.iterate((asteroide) => {
            if (asteroide && asteroide.y > 650) asteroide.destroy();
          });

          if (this.faseJefe && this.estrellaMuerte && this.estrellaMuerte.active) {
            this.estrellaMuerte.x = 400 + Math.sin(this.time.now / 1000) * 200;
          }
        }

        dispararLaser() {
          if (!this.j1.active) return;
          this.sound.play("laser", { volume: 0.3 });
          let laser = this.lasers.create(this.j1.x, this.j1.y - 30, "laser");
          laser.setVelocityY(-1000); 
        }

        impactoTieAJ1(j1, laser) {
          laser.destroy();
          this.vidaJ1 -= 15;
          this.dibujarBarraVida();

          j1.setTint(0xff0000);
          this.time.delayedCall(100, () => j1.clearTint());

          if (this.vidaJ1 <= 0) {
            this.atraparJugador(this.tieFighter, this.j1);
          }
        }

        generarAsteroide() {
          if (this.juegoTerminado || this.faseJefe) return;
          let x = Phaser.Math.Between(50, 750);
          let asteroide = this.asteroides.create(x, -50, "asteroide");
          asteroide.setDisplaySize(50, 44);
          asteroide.body.setCircle(160);
          asteroide.setVelocityY(Phaser.Math.Between(300, 500)); 
          asteroide.setAngularVelocity(Phaser.Math.Between(-150, 150));
        }

        iniciarFaseJefe() {
          this.faseJefe = true;
          if (this.generadorAsteroides) this.generadorAsteroides.destroy();
          this.asteroides.clear(true, true);

          this.estrellaMuerte = this.physics.add.sprite(400, -200, "estrellaMuerte");
          this.estrellaMuerte.setDisplaySize(250, 238);
          this.estrellaMuerte.body.setCircle(240);
          
          this.estrellaMuerteVidaMax = 2000;
          this.estrellaMuerteVida = 2000;

          this.tweens.add({
            targets: this.estrellaMuerte,
            y: 150,
            duration: 3000,
            ease: "Power2"
          });

          this.barraJefeBg = this.add.graphics();
          this.barraJefe = this.add.graphics();
          this.dibujarBarraJefe();

          this.physics.add.overlap(this.lasers, this.estrellaMuerte, this.impactoJefe, null, this);
          this.physics.add.overlap(this.j1, this.estrellaMuerte, this.chocarJefe, null, this);
        }

        dibujarBarraJefe() {
          this.barraJefeBg.clear();
          this.barraJefeBg.fillStyle(0x333333, 0.8);
          this.barraJefeBg.fillRect(200, 20, 400, 12);

          this.barraJefe.clear();
          this.barraJefe.fillStyle(0xff0000, 0.8);
          let anchoJefe = (Math.max(this.estrellaMuerteVida, 0) / this.estrellaMuerteVidaMax) * 400;
          this.barraJefe.fillRect(200, 20, anchoJefe, 12);
        }

        impactoJefe(jefe, laser) {
          this.particulasE.emitParticleAt(laser.x, laser.y - 10, 5); // Chispas al chocar
          laser.destroy();
          this.estrellaMuerteVida -= 100;
          this.dibujarBarraJefe();

          jefe.setTint(0xffbbbb);
          this.time.delayedCall(100, () => jefe.clearTint());

          if (this.estrellaMuerteVida <= 0) {
            this.derrotarJefe();
          }
        }

        chocarJefe(jugador, jefe) {
          this.vidaJ1 -= 2;
          this.dibujarBarraVida();
          this.cameras.main.shake(100, 0.01);
          if (this.vidaJ1 <= 0) {
            this.atraparJugador(this.tieFighter, this.j1);
          }
        }

        chocarFrenazo(jugador, asteroide) {
          this.particulasE.emitParticleAt(asteroide.x, asteroide.y, 15); // Explosión de asteroide
          asteroide.destroy();
          this.vidaJ1 -= 20;
          this.dibujarBarraVida();
          
          this.cameras.main.shake(200, 0.02);
          jugador.setTint(0xff0000);
          this.time.delayedCall(200, () => jugador.clearTint());

          if (this.vidaJ1 <= 0) {
            this.atraparJugador(this.tieFighter, this.j1);
          }
        }

        atraparJugador(tie, jugador) {
          let exp = this.add.sprite(jugador.x, jugador.y, "explosion");
          exp.setScale(0.5);
          this.tweens.add({ targets: exp, scale: 2, alpha: 0, duration: 800 });

          jugador.disableBody(true, true);
          jugador.active = false;
          this.vidaJ1 = 0;
          this.dibujarBarraVida();

          this.physics.pause();
          this.juegoTerminado = true;
          this.textoGameOver.setVisible(true);
          if (this.generadorAsteroides) this.generadorAsteroides.destroy();
        }

        derrotarJefe() {
          this.physics.pause();
          this.estrellaMuerte.setVisible(false);
          
          this.sound.play("musicawin", { volume: 0.6 });

          let exp = this.add.sprite(this.estrellaMuerte.x, this.estrellaMuerte.y, "explosion");
          exp.setScale(0.1);
          
          this.tweens.add({
            targets: exp,
            scaleX: 2.5,
            scaleY: 2.5,
            alpha: 0,
            duration: 2000,
            ease: "Power2"
          });

          this.cameras.main.shake(2000, 0.05);
          this.cameras.main.flash(1500, 255, 255, 255);
          
          this.time.delayedCall(2500, () => {
            this.scene.start("GanadorScene");
          });
        }

        reiniciarJuego() {
          this.sound.stopAll();
          this.scene.restart();
        }
      }

      class GanadorScene extends Phaser.Scene {
        constructor() {
          super("GanadorScene");
        }

        volverAlMenu() {
          this.sound.stopAll();
          this.scene.start("MenuScene");
        }

        create() {
          let bg = this.add.image(400, 300, "final");
          bg.setDisplaySize(800, 600);

          let overlay = this.add.graphics();
          overlay.fillStyle(0x000000, 0.6);
          overlay.fillRect(0, 0, 800, 600);

          this.add.text(400, 200, "¡VICTORIA!", {
            fontSize: "64px",
            fill: "#FFE81F",
            fontFamily: "'Orbitron', sans-serif",
            shadow: { color: "#000000", fill: true, offsetX: 4, offsetY: 4, blur: 8 }
          }).setOrigin(0.5);

          this.add.text(400, 300, "La galaxia está a salvo... por ahora.", {
            fontSize: "22px",
            fill: "#ffffff",
            fontFamily: "'Roboto Mono', monospace",
            shadow: { color: "#000000", fill: true, offsetX: 2, offsetY: 2, blur: 4 }
          }).setOrigin(0.5);

          let btn = this.add.text(400, 500, "TOCA PARA VOLVER AL MENÚ", {
            fontSize: "20px",
            fill: "#00ff00",
            fontFamily: "'Roboto Mono', monospace",
          }).setOrigin(0.5).setInteractive({ useHandCursor: true });

          this.tweens.add({
            targets: btn,
            alpha: 0.2,
            duration: 800,
            yoyo: true,
            repeat: -1
          });

          this.input.keyboard.on("keydown-ENTER", () => this.volverAlMenu());
          this.input.keyboard.on("keydown-SPACE", () => this.volverAlMenu());
          this.input.on("pointerdown", () => this.volverAlMenu());
        }
      }

      // Configuracion del juego para ser Responsivo y estar centrado
      const config = {
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: 800,
            height: 600
        },
        physics: {
          default: "arcade",
          arcade: { 
            gravity: { y: 0 }, 
            debug: true 
          },
        },
        scene: [BootScene, MenuScene, GameScene, GanadorScene]
      };

      const game = new Phaser.Game(config);

      function crearGraficoEspacio() {
        let canvas = document.createElement("canvas");
        canvas.width = 800;
        canvas.height = 600;
        let ctx = canvas.getContext("2d");
        ctx.fillStyle = "#020208";
        ctx.fillRect(0, 0, 800, 600);
        ctx.fillStyle = "#ffffff";
        for (let i = 0; i < 150; i++) { 
          ctx.fillRect(Math.random() * 800, Math.random() * 600, Math.random() * 2.5 + 0.5, Math.random() * 2.5 + 0.5);
        }
        return canvas;
      }

      function crearGraficoLaser() {
        let canvas = document.createElement("canvas");
        canvas.width = 4;
        canvas.height = 25;
        let ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ff0000";
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = 5;
        ctx.fillRect(0, 0, 4, 25);
        return canvas;
      }

      function crearGraficoLaserTie() {
        let canvas = document.createElement("canvas");
        canvas.width = 4;
        canvas.height = 25;
        let ctx = canvas.getContext("2d");
        ctx.fillStyle = "#00ff00";
        ctx.shadowColor = "#00ff00";
        ctx.shadowBlur = 5;
        ctx.fillRect(0, 0, 4, 25);
        return canvas;
      }
    </script>
  </body>
</html>
